<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jedlikmemes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    body { background-color: #030303; font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="text-gray-200">

  <nav class="sticky top-0 z-50 bg-[#1A1A1B] border-b border-[#343536] px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-2 flex-shrink-0 cursor-pointer">
      <div class="bg-yellow-400 text-black p-1 rounded-full w-8 h-8 flex items-center justify-center font-bold">J</div>
      <span class="text-white font-bold text-lg tracking-tight hidden xs:block mono">jedlikmemes</span>
    </div>

    <div class="flex-1 max-w-xl mx-2 sm:mx-4">
      <div class="relative">
        <input 
          type="text" 
          placeholder="Keresés..." 
          class="w-full bg-[#272729] border border-[#343536] rounded-full py-1.5 px-4 sm:px-10 text-sm focus:outline-none focus:border-yellow-500 transition-all"
        />
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button class="px-3 py-1.5 text-yellow-400 text-xs sm:text-sm font-semibold hover:bg-yellow-400/10 rounded-full transition">Belépés</button>
      <button class="px-3 py-1.5 bg-yellow-400 text-black rounded-full text-xs sm:text-sm font-semibold hover:bg-yellow-300 transition">Regisztráció</button>
    </div>
  </nav>
  <main class="max-w-[1200px] mx-auto p-4 flex flex-col lg:flex-col gap-6" id="memes-main">

    <section class="flex-1 order-1">
      
      <article class="bg-[#1A1A1B] border border-[#343536] rounded-md flex flex-col sm:flex-row overflow-hidden hover:border-gray-500 transition">
        
        <div class="w-full sm:w-12 bg-[#151516] p-2 flex sm:flex-col items-center justify-around sm:justify-start gap-1 border-b sm:border-b-0 sm:border-r border-[#343536]">
          <button class="hover:bg-white/10 p-1 rounded text-xl text-gray-400 hover:text-yellow-400">▲</button>
          <span class="text-xs font-bold mono">420</span>
          <button class="hover:bg-white/10 p-1 rounded text-xl text-gray-400 hover:text-blue-400">▼</button>
        </div>

        <div class="flex-1 p-3">
          <div class="flex items-center gap-2 text-[10px] sm:text-xs text-gray-500 mb-2">
            <span class="font-bold text-gray-300">u/jedlik_user</span>
          </div>
          <h2 class="text-base sm:text-lg font-semibold text-white mb-3">Amikor a kódban minden reszponzív lett végre</h2>
          
          <div class="bg-black rounded border border-[#343536] flex items-center justify-center aspect-video w-full">
            <span class="text-yellow-400/20 text-2xl font-bold mono">MEME</span>
          </div>
        </div>
      </article>

    </section>
    <aside class="w-full lg:w-[312px] flex flex-col gap-4 order-2">
      
      <div class="bg-[#1A1A1B] border border-[#343536] rounded-md overflow-hidden">
        <div class="h-10 bg-yellow-500"></div>
        <div class="p-4">
          <div class="flex items-center gap-3 -mt-8 mb-3">
            <div class="w-12 h-12 bg-yellow-400 text-black border-4 border-[#1A1A1B] rounded-full flex items-center justify-center font-bold text-xl shadow-xl">J</div>
            <span class="mt-4 font-bold text-lg">j/jedlikmemes</span>
          </div>
          <p class="text-sm text-gray-300 mb-4">
            A Jedlik Ányos Technikum informatikai mémjeinek gyűjtőhelye.
          </p>
          <button class="w-full bg-yellow-400 text-black py-2 rounded-full font-bold hover:bg-yellow-300 transition">
            Csatlakozás
          </button>
        </div>
      </div>

      <div class="bg-[#1A1A1B] border border-[#343536] rounded-md p-4">
        <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">Jogi dolgok</h3>
        <ul class="text-sm space-y-2 text-gray-400">
          <li class="hover:text-yellow-400 cursor-pointer flex justify-between">
            <span>Szabályzat</span>
            <span>→</span>
          </li>
          <li class="hover:text-yellow-400 cursor-pointer flex justify-between">
            <span>Adatvédelem</span>
            <span>→</span>
          </li>
        </ul>
      </div>

      <div class="text-[10px] text-gray-600 px-2 py-4 text-center lg:text-left">
        © 2024 Jedlikmemes. Minden jog fenntartva.
      </div>
    </aside>

  </main>
  <script type="module" src="/main.ts"></script>
</body>
</html>
